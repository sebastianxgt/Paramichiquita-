<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Persona Favorita ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #060112;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* FONDO CÓSMICO ANIMADO */
        .universe-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(234, 42, 234, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 144, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at center, #0d041e 0%, #05010a 100%);
            animation: auroraMotion 15s ease infinite alternate;
            z-index: 1;
        }

        @keyframes auroraMotion {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* PANTALLA DE INICIO ELEGANTE */
        .welcome-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #05010a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), pointer-events 0.8s;
        }
        .welcome-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .welcome-title {
            font-size: 26px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #f3e8f4;
            text-align: center;
            padding: 0 20px;
        }
        .start-btn {
            background: linear-gradient(135deg, #ff477e, #ea2aea);
            border: none;
            padding: 16px 32px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(234, 42, 234, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(234, 42, 234, 0.6);
        }

        /* ESTRELLAS BRILLANTES (NEÓN EN 2D) */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: pulseStar var(--d) infinite alternate ease-in-out;
            z-index: 2;
        }
        @keyframes pulseStar {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* CONTENEDOR CENTRAL */
        .main-container {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* CORAZÓN PREMIUM CON AURA */
        .heart-wrapper {
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .heart-aura {
            position: absolute;
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255, 71, 126, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: auraExpand 2s infinite ease-out;
        }
        .center-heart {
            font-size: 80px;
            filter: drop-shadow(0 0 20px rgba(255, 71, 126, 0.8));
            animation: elegantPulse 1.5s infinite cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
            -webkit-user-select: none;
            z-index: 2;
        }

        @keyframes auraExpand {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        @keyframes elegantPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(255, 71, 126, 1)); }
        }

        /* TEXTOS FLOTANTES EN 2D CON GLOW */
        .floating-word {
            position: absolute;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 12px var(--glow-color);
            pointer-events: none;
            white-space: nowrap;
            z-index: 4;
            animation: float2D var(--duration) linear infinite;
        }

        @keyframes float2D {
            0% {
                transform: translate(var(--startX), var(--startY)) scale(0.8);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translate(var(--endX), var(--endY)) scale(1.1);
                opacity: 0;
            }
        }

        /* EFECTO DE TOQUE MÁGICO (ESTELA) */
        .magic-sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 16px;
            z-index: 10;
            filter: drop-shadow(0 0 5px #ff85a2);
            animation: sparkleFade 0.8s forwards ease-out;
        }
        @keyframes sparkleFade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(0.3); opacity: 0; }
        }

        /* DISEÑO DE TARJETA ESTILO GLASSMORPHISM (CRISTAL) */
        .letter-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(3, 1, 7, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .letter-overlay.active { opacity: 1; pointer-events: auto; }
        
        .letter-card {
            background: linear-gradient(135deg, rgba(35, 15, 50, 0.7) 0%, rgba(10, 5, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(234, 42, 234, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            width: 90%; max-width: 400px;
            text-align: center;
            color: #fff;
            transform: translateY(40px);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .letter-overlay.active .letter-card { transform: translateY(0); }
        
        .letter-card h2 { 
            color: #ff85a2; 
            font-weight: 400; 
            margin-bottom: 20px; 
            font-size: 24px; 
            letter-spacing: 1px;
        }
        .letter-card p { 
            font-size: 15px; 
            line-height: 1.8; 
            color: #e2d5e5; 
            margin-bottom: 30px; 
            font-weight: 300;
        }
        .close-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 28px; 
            color: white;
            font-size: 14px;
            font-weight: 500; 
            border-radius: 50px; 
            cursor: pointer;
            transition: all 0.3s;
        }
        .close-btn:hover {
            background: white;
            color: #05010a;
        }
    </style>
</head>
<body>

    <div class="universe-background"></div>
    <div id="starsGroup"></div>

    <div class="welcome-overlay" id="welcomeOverlay">
        <h1 class="welcome-title">Un espacio dedicado a ti ✨</h1>
        <button class="start-btn" id="startBtn">❤️ Abrir Universo</button>
    </div>

    <div class="main-container">
        <div class="heart-wrapper" id="heartBtn">
            <div class="heart-aura"></div>
            <div class="center-heart">❤️</div>
        </div>
    </div>

    <div id="wordsContainer"></div>

    <audio id="bgMusic" loop preload="auto">
        <source src="The Winner Is - DeVotchKa (320k).mp3" type="audio/mpeg">
    </audio>

    <div class="letter-overlay" id="letterModal">
        <div class="letter-card">
            <h2>Para Mi Persona Favorita ✨</h2>
            <p>Escribe aquí tu mensaje desde el corazón. Cuéntale por qué es tan importante para ti, recuerda momentos lindos que hayan pasado juntos o lo mucho que valoras tenerle en tu vida. ¡Hazlo completamente tuyo!</p>
            <button class="close-btn" id="closeBtn">Regresar al universo</button>
        </div>
    </div>

    <script>
        const palabrasAmor = [
            "✨ Contigo siempre", "❤️ Te amo", "☀️ Mi sol", "🌷 Tu hermosa risa", "🌹 Amor eterno", 
            "🌍 Mi mundo entero", "🥰 Mi vida", "💖 Brillas tanto", "🎁 Mi mejor razón", "🔥 Siempre tú", 
            "🌈 Mi alegría", "🌌 Universo entero", "☁️ Mi cielo", "🌙 Mi dulce sueño", "💎 Eres mi todo", 
            "⭐ Mi estrella", "🦋 Mi paz", "💫 Nuestro destino", "🧸 Mi lugar seguro"
        ];
        const coloresGlow = ['#ff477e', '#ff85a2', '#ea2aea', '#00f5d4', '#ffb703'];
        
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const startBtn = document.getElementById('startBtn');
        const bgMusic = document.getElementById('bgMusic');
        const heartBtn = document.getElementById('heartBtn');
        const letterModal = document.getElementById('letterModal');
        const closeBtn = document.getElementById('closeBtn');
        const starsGroup = document.getElementById('starsGroup');
        const wordsContainer = document.getElementById('wordsContainer');

        // Generar Estrellas Elegantes
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.setProperty('--d', `${Math.random() * 3 + 2}s`);
            starsGroup.appendChild(star);
        }

        // Sistema de palabras flotantes en 2D mejorado (Brotan desde el corazón)
        function crearPalabra2D(texto) {
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = texto;

            const glow = coloresGlow[Math.floor(Math.random() * coloresGlow.length)];
            word.style.setProperty('--glow-color', glow);

            // Inician justo en el centro de la pantalla (donde está el corazón)
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;

            // Ángulo aleatorio para que se dispersen elegantemente hacia los bordes
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.max(window.innerWidth, window.innerHeight) * 0.6;
            
            const endX = startX + Math.cos(angle) * distance;
            const endY = startY + Math.sin(angle) * distance;

            word.style.setProperty('--startX', `${startX}px`);
            word.style.setProperty('--startY', `${startY}px`);
            word.style.setProperty('--endX', `${endX}px`);
            word.style.setProperty('--endY', `${endY}px`);
            word.style.setProperty('--duration', `${Math.random() * 4 + 6}s`);

            wordsContainer.appendChild(word);
            setTimeout(() => { word.remove(); }, 10000);
        }

        let wordIndex = 0;
        function loopPalabras() {
            crearPalabra2D(palabrasAmor[wordIndex]);
            wordIndex = (wordIndex + 1) % palabrasAmor.length;
            setTimeout(loopPalabras, 800);
        }

        // Interacciones y Audio
        startBtn.addEventListener('click', () => {
            welcomeOverlay.classList.add('hidden');
            if (bgMusic) bgMusic.play().catch(e => console.log(e));
            loopPalabras();
        });

        // Estela mágica al mover el dedo o mouse
        function triggerSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'magic-sparkle';
            sparkle.innerText = "✨";
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            sparkle.style.setProperty('--mx', `${(Math.random() - 0.5) * 60}px`);
            sparkle.style.setProperty('--my', `${(Math.random() - 0.5) * 60}px`);
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 800);
        }

        window.addEventListener('mousemove', (e) => triggerSparkle(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => triggerSparkle(e.touches[0].clientX, e.touches[0].clientY));

        heartBtn.addEventListener('click', () => letterModal.classList.add('active'));
        closeBtn.addEventListener('click', () => letterModal.classList.remove('active'));
    </script>
</body>
</html>
